# Запуск:  docker compose --env-file backend/.env up --build
#
# Один источник правды для секретов — backend/.env.
# Флаг --env-file подсовывает его и для интерполяции в этом файле,
# и для backend-контейнера (через env_file ниже).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Внутри docker-сети хост БД — это имя сервиса, не localhost
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build: ./CSBS-FRONTEND
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

  postgres-backup:
    image: prodrigestivill/postgres-backup-local:16
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      # Cron-расписание бэкапа. @daily = каждый день в 00:00 UTC
      SCHEDULE: "@daily"
      # Политика хранения дампов
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      # Опции pg_dump (gzip-сжатие)
      POSTGRES_EXTRA_OPTS: "-Z6 --schema=public --blobs"
    volumes:
      # Дампы складываются в ./backups/{daily,weekly,monthly} на хосте
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
